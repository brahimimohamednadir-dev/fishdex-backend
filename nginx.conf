# ── FishDex — Configuration Nginx production ──────────────────────────────────
# Copier dans /etc/nginx/sites-available/fishdex et activer avec symlink

# ── Rate limiting zones ──────────────────────────────────────────────────────
# Zone globale : 20 req/s par IP
limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;

# Zone auth renforcée : 5 req/min par IP (login, register, mot de passe oublié)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Zone API standard : 60 req/min par IP
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# ── Upstream Spring Boot ─────────────────────────────────────────────────────
upstream fishdex_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── Redirection HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name fishdex.fr www.fishdex.fr;
    return 301 https://$host$request_uri;
}

# ── Serveur HTTPS principal ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name fishdex.fr www.fishdex.fr;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/fishdex.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fishdex.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Headers de sécurité globaux ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/fishdex.access.log;
    error_log  /var/log/nginx/fishdex.error.log warn;

    # ── Frontend Angular (SPA) ───────────────────────────────────────────────
    root /var/www/fishdex/browser;
    index index.html;

    location / {
        limit_req zone=global burst=30 nodelay;
        try_files $uri $uri/ /index.html;

        # Cache agressif pour assets hachés (Angular output)
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API Backend ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://fishdex_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Masque les erreurs internes Spring Boot
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    # ── Auth — rate limiting renforcé ────────────────────────────────────────
    location ~ ^/api/auth/(login|register|forgot-password|reset-password)$ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://fishdex_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── OAuth2 ───────────────────────────────────────────────────────────────
    location /oauth2/ {
        proxy_pass http://fishdex_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Actuator health (monitoring) ─────────────────────────────────────────
    location /actuator/health {
        proxy_pass http://fishdex_backend;
        access_log off;
    }

    # Bloquer les autres endpoints actuator
    location /actuator/ {
        deny all;
        return 404;
    }

    # ── Erreur API indisponible ──────────────────────────────────────────────
    location @api_unavailable {
        default_type application/json;
        return 503 '{"success":false,"message":"Service temporairement indisponible. Réessayez dans quelques instants."}';
    }

    # ── Bloquer les accès indésirables ───────────────────────────────────────
    location ~ /\. { deny all; }
    location = /robots.txt { return 200 "User-agent: *\nDisallow: /api/\nDisallow: /actuator/\n"; }
    location = /favicon.ico { access_log off; log_not_found off; }
}
