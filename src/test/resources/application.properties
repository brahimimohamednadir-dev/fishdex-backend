# ── H2 en mémoire pour les tests ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:fishdex_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT (access token longue durée pour les tests — pas d'expiration pendant les tests) ──
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-32-characters
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ── Dev data désactivé en tests ──────────────────────────────────────────────
# app.dev-data.enabled non défini → DevDataInitializer ne s'exécute pas

# ── Email — désactivé en tests (JavaMailSender sera absent, EmailService fault-tolerant) ──
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=
spring.mail.password=
app.mail.from=noreply@fishdex.fr
app.frontend-url=http://localhost:4200

# ── Logging minimal en tests ─────────────────────────────────────────────────
logging.level.com.fishdex=WARN
logging.level.org.springframework.security=WARN
