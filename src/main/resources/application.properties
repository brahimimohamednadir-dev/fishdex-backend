# ── Base de données ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/fishdex
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# Désactive le lazy loading hors transaction (fail-fast plutôt que N+1 silencieux)
spring.jpa.open-in-view=false

# ── App ───────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=fishdex-backend

# ── Jackson — dates ISO-8601 ─────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Encoding UTF-8 ────────────────────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ── JWT — définir JWT_SECRET en variable d'environnement en production ────────
# Access token : 15 min en prod (refresh token prend le relais)
jwt.secret=${JWT_SECRET:fishdex-dev-secret-key-change-this-in-production-min-32chars}
jwt.expiration=${JWT_EXPIRATION:900000}
# Refresh token : 7 jours
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Dev data seed (désactiver en prod) ───────────────────────────────────────
app.dev-data.enabled=true

# ── Frontend URL (liens dans les emails) ─────────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# ── Email (SMTP) ──────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
app.mail.from=${MAIL_FROM:noreply@fishdex.fr}

# ── Cloudinary (upload photos) ───────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{requestId:-?}] %-5level %logger{30} — %msg%n
logging.level.com.fishdex=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
